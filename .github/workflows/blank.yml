name: Build gRPC on Ubuntu 20.04 (Docker)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest   # 宿主机使用最新 Ubuntu，确保 Docker 可用
    container:
      image: ubuntu:20.04     # 使用 Ubuntu 20.04 容器
      options: --user root    # 使用 root 用户，避免权限问题

    steps:
      # 安装编译依赖（容器内）
      - name: Install dependencies
        run: |
          apt update
          apt install -y cmake build-essential autoconf libtool pkg-config git

      # 配置 Git 安全目录（避免在容器内 clone 时报权限错误）
      - name: Configure Git safe directory
        run: git config --global --add safe.directory '*'

      # 克隆 gRPC 源码（含子模块）
      - name: Checkout gRPC
        run: |
          git clone --recurse-submodules -b v1.58.0 --depth 1 --shallow-submodules https://github.com/grpc/grpc
          cd grpc

      # 编译 gRPC 主库
      - name: Build gRPC
        run: |
          cd grpc
          mkdir -p cmake/build
          cd cmake/build
          export GRPC_INSTALL_DIR=$HOME/grpc/install
          cmake -DgRPC_INSTALL=ON \
                -DgRPC_BUILD_TESTS=OFF \
                -DCMAKE_INSTALL_PREFIX=$GRPC_INSTALL_DIR \
                ../..
          make -j $(nproc)
          make install

      # 编译 abseil-cpp（gRPC 第三方依赖）
      - name: Build abseil-cpp
        run: |
          cd grpc
          mkdir -p third_party/abseil-cpp/cmake/build
          cd third_party/abseil-cpp/cmake/build
          export GRPC_EXT_INSTALL_DIR=$HOME/grpc/install_ext
          cmake -DCMAKE_INSTALL_PREFIX=$GRPC_EXT_INSTALL_DIR \
                -DCMAKE_POSITION_INDEPENDENT_CODE=TRUE \
                ../..
          make -j $(nproc)
          make install

      # 打包并上传 gRPC 安装目录（避免单个 artifact 过大）
      - name: Package gRPC artifacts
        run: |
          tar -czf grpc-install.tar.gz -C $HOME/grpc install
          tar -czf abseil-cpp-install.tar.gz -C $HOME/grpc install_ext

      - name: Upload gRPC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grpc-install
          path: grpc-install.tar.gz

      - name: Upload abseil-cpp artifacts
        uses: actions/upload-artifact@v4
        with:
          name: abseil-cpp-install
          path: abseil-cpp-install.tar.gz
